name: Production Static CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  static-build:
    runs-on: ubuntu-latest
    env:
      SITE_MODE: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (production mode)
        run: npm run astro -- check

      - name: Build static site
        run: npm run build:prod

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  ftp-deploy:
    name: FTP deploy (master push)
    runs-on: ubuntu-latest
    needs: static-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && secrets.FTP_SERVER != '' && secrets.FTP_USERNAME != '' && secrets.FTP_PASSWORD != '' && secrets.FTP_REMOTE_DIR != ''
    steps:
      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist

      - name: Upload dist/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}

