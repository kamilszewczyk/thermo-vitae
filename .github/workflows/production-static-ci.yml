name: Production Static CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  static-build:
    runs-on: ubuntu-latest
    env:
      SITE_MODE: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check (production mode)
        run: npm run astro -- check

      - name: Build static site
        run: npm run build:prod

      - name: Upload static artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

  ftp-deploy:
    name: FTP deploy (master push)
    runs-on: ubuntu-latest
    needs: static-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Download static artifact
        uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: dist

      - name: Validate FTP secrets
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          missing=""
          [ -z "$FTP_SERVER" ] && missing="$missing FTP_SERVER"
          [ -z "$FTP_USERNAME" ] && missing="$missing FTP_USERNAME"
          [ -z "$FTP_PASSWORD" ] && missing="$missing FTP_PASSWORD"
          [ -z "$FTP_REMOTE_DIR" ] && missing="$missing FTP_REMOTE_DIR"
          if [ -n "$missing" ]; then
            echo "::error::Missing required FTP secrets:$missing"
            exit 1
          fi

      - name: Upload dist/ via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}

