content: >-
  Solidna firma. Fachowcy sprawnie zmodernizowali kotłownie przy czym
  uwzględnili wszystkie moje wytyczne zmian które chciałem wprowadzić. Wszystko
  przeprowadzone w terminie co do dnia. Wspaniała pomoc w doradztwie przy
  dofinansowaniu jak i sam kontakt z firmą.
authorPlace: Krajanek

